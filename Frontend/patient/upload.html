<!DOCTYPE html>
<html>
<head>
    <title>Upload Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container mt-5">
    <h3>Upload Medical Document</h3>
    <input type="file" class="form-control mt-3" id="fileInput">
    <small class="text-muted d-block mt-1">Images (JPG/PNG) will be OCR-scanned before upload.</small>
    <button class="btn btn-primary mt-3" onclick="uploadDocument()">Upload</button>
</div>

<script src="../js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="../js/upload-ocr.js"></script>
</body>
</html>
