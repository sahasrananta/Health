services:
  - type: web
    name: medicare-hms
    env: node
    plan: free # Can be upgraded to starter/pro for disk persistence
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./data/app.db
      - key: CORS_ORIGIN
        value: "*"
      - key: EMAIL_USER
        sync: false # Set in Render Dashboard
      - key: EMAIL_PASS
        sync: false # Set in Render Dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false # Set in Render Dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false # Set in Render Dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false # Set in Render Dashboard
    disk:
      name: data-storage
      mountPath: /opt/render/project/src/Backend/data
      sizeGB: 1
